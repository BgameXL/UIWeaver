<script>
    var PAGES = {
        "index": "<h1>Introduction</h1>\n<p class=\"page-subtitle\">What UIWeaver is and why it exists.</p>\n\n<p>UIWeaver is an experimental UI framework for Minecraft mods, focused on building server-driven, declarative, and debuggable interfaces without writing every screen by hand.</p>\n<p>Instead of manually positioning every widget with hardcoded coordinates, UIWeaver lets you describe a UI as a tree of components. The framework handles layout, rendering, input, and server sync.</p>\n\n<h2>Why UIWeaver</h2>\n<p>Standard Minecraft GUI development has several recurring problems:</p>\n<table>\n<thead><tr><th>Problem</th><th>UIWeaver approach</th></tr></thead>\n<tbody>\n<tr><td>Hardcoded <code>x</code>, <code>y</code> for every widget</td><td>Declarative layout containers handle positioning</td></tr>\n<tr><td>Layouts break at different GUI scales</td><td>Layout engine adapts to screen size</td></tr>\n<tr><td>Client state trusted directly</td><td>Named server actions with server-side validation</td></tr>\n<tr><td>Sync, render, input mixed together</td><td>ViewModel separates state from rendering</td></tr>\n<tr><td>Layout debugging is painful</td><td>Built-in debug overlay and inspector</td></tr>\n</tbody>\n</table>\n\n<h2>Status</h2>\n<p>UIWeaver is at <strong>v0.1.0</strong> \u2014 a working prototype. The core concepts are proven. Some areas like slot layout and the styling system are still being improved.</p>\n<p>It currently targets <strong>Forge 1.20.1</strong> with Architectury for Fabric compatibility.</p>\n\n<div class=\"note\"><strong>Note:</strong> UIWeaver is experimental. The API may change between versions.</div>\n\n<h2>Quick look</h2>\n<pre><code>ui.column()\n    .padding(8)\n    .gap(6)\n    .add(ui.label(Component.literal(\"Machine Dashboard\")))\n    .add(ui.row()\n        .gap(4)\n        .add(ui.button(Component.literal(\"Start\")).action(\"start\"))\n        .add(ui.button(Component.literal(\"Stop\")).action(\"stop\"))\n    )\n    .add(ui.progressBar().bind(\"progress\"));</code></pre>\n\n",
        "installation": "<h1>Installation</h1>\n<p class=\"page-subtitle\">Adding UIWeaver to your mod project.</p>\n\n<h2>Requirements</h2>\n<table>\n<thead><tr><th>Requirement</th><th>Version</th></tr></thead>\n<tbody>\n<tr><td>Minecraft</td><td>1.20.1</td></tr>\n<tr><td>Forge</td><td>47.x</td></tr>\n<tr><td>Java</td><td>17+</td></tr>\n</tbody>\n</table>\n\n<h2>Adding UIWeaver as a dependency</h2>\n<p>In your <code>build.gradle</code>:</p>\n<pre><code>repositories {\n    maven { url \"https://maven.pkg.github.com/BgameXL/UIWeaver\" }\n}\n\ndependencies {\n    implementation fg.deobf(\"com.bgame:uiweaver-forge:0.1.0\")\n}</code></pre>\n\n<p>In <code>gradle.properties</code>:</p>\n<pre><code>uiweaver_version=0.1.0</code></pre>\n\n<h2>Verify the setup</h2>\n<p>After syncing Gradle, you should have access to the <code>com.bgame.uiweaver</code> package. Import <code>UIWeaver</code> in any class to confirm it resolved correctly:</p>\n<pre><code>import com.bgame.uiweaver.UIWeaver;</code></pre>\n\n<div class=\"note\"><strong>Note:</strong> UIWeaver is licensed under LGPL-3.0. You can use it as a library in closed-source mods as long as modifications to UIWeaver itself stay under LGPL-3.0.</div>\n\n",
        "first-screen": "<h1>Your First Screen</h1>\n<p class=\"page-subtitle\">Building a simple machine UI from scratch.</p>\n\n<h2>Goal</h2>\n<p>This page walks through building a minimal machine screen with a title, an energy bar, a progress bar, and a Start button.</p>\n\n<h2>1. Create a ViewModel</h2>\n<p>The ViewModel holds synced values the UI can read. Define it on the server side:</p>\n<pre><code>public class ReactorViewModel extends UIViewModel {\n\n    public final SyncedInt energy    = syncInt(\"energy\", 0);\n    public final SyncedInt maxEnergy = syncInt(\"maxEnergy\", 10000);\n    public final SyncedInt progress  = syncInt(\"progress\", 0);\n}</code></pre>\n\n<h2>2. Define the UI</h2>\n<p>Build the component tree. This runs once when the screen opens:</p>\n<pre><code>UIWeaver.screen(player, menu)\n    .root(ui.column().padding(12).gap(8).size(300, 200)\n\n        .add(ui.label(Component.literal(\"Reactor\"))\n            .id(\"title\"))\n\n        .add(ui.row().gap(8).fillWidth()\n            .add(ui.energyBar()\n                .bind(\"energy\", \"maxEnergy\")\n                .size(12, 54))\n\n            .add(ui.progressBar()\n                .id(\"progress\")\n                .fillWidth()\n                .height(12))\n        )\n\n        .add(ui.button(Component.literal(\"Start\"))\n            .action(\"start\")\n            .size(60, 20))\n    )\n    .viewModel(reactorViewModel)\n    .open();</code></pre>\n\n<h2>3. Handle the server action</h2>\n<p>Actions are validated and handled on the server:</p>\n<pre><code>@Override\npublic void onAction(ServerPlayer player, String action) {\n    if (action.equals(\"start\")) {\n        if (canStart()) startMachine();\n    }\n}</code></pre>\n\n<h2>4. Update synced values</h2>\n<p>Update the ViewModel each tick and UIWeaver will sync only what changed:</p>\n<pre><code>@Override\npublic void tick() {\n    viewModel.energy.set(energyContainer.getEnergyStored());\n    viewModel.progress.set(currentProgress);\n}</code></pre>\n\n<div class=\"note\"><strong>Result:</strong> A screen that automatically repositions its widgets, syncs energy and progress from the server each tick, and validates the Start action server-side before doing anything.</div>\n\n",
        "component-tree": "<h1>Component Tree</h1>\n<p class=\"page-subtitle\">How UIWeaver screens are structured.</p>\n\n<p>Every UIWeaver screen is built from a tree of components. The root is always a single container \u2014 usually a <code>column</code> \u2014 and all other components are children of it.</p>\n\n<h2>Structure</h2>\n<pre><code>root (column)\n\u251c\u2500\u2500 label\n\u251c\u2500\u2500 row\n\u2502   \u251c\u2500\u2500 energyBar\n\u2502   \u2514\u2500\u2500 progressBar\n\u2514\u2500\u2500 button</code></pre>\n\n<p>Components are added with <code>.add()</code>. Containers can hold any number of children:</p>\n<pre><code>ui.column()\n    .add(ui.label(...))\n    .add(ui.row()\n        .add(ui.button(...))\n        .add(ui.button(...))\n    );</code></pre>\n\n<h2>IDs</h2>\n<p>Give components an ID with <code>.id(\"name\")</code>. IDs are used for ViewModel binding, debug inspection, and server action targeting:</p>\n<pre><code>ui.progressBar().id(\"mainProgress\").bind(\"progress\")</code></pre>\n\n<h2>How layout works</h2>\n<p>UIWeaver runs a layout pass before rendering. Each container measures its children and assigns them positions. You describe <em>what</em> the structure is \u2014 the framework decides <em>where</em> everything goes.</p>\n<p>This means you never write <code>x = leftPos + 24</code>. If padding or a sibling changes size, everything adjusts automatically.</p>\n\n<h2>Lifecycle</h2>\n<table>\n<thead><tr><th>Phase</th><th>What happens</th></tr></thead>\n<tbody>\n<tr><td>Build</td><td>Component tree is constructed on first open</td></tr>\n<tr><td>Layout</td><td>Sizes and positions are calculated</td></tr>\n<tr><td>Render</td><td>Each component draws itself</td></tr>\n<tr><td>Input</td><td>Clicks and keys are dispatched top-down</td></tr>\n<tr><td>Sync</td><td>ViewModel sends changed values to client</td></tr>\n</tbody>\n</table>\n\n",
        "layout": "<h1>Layout Containers</h1>\n<p class=\"page-subtitle\">column, row, grid, tabs, and scrollPanel.</p>\n\n<p>Layout containers position their children automatically. You set constraints \u2014 padding, gap, size \u2014 and the container handles the math.</p>\n\n<h2>column</h2>\n<p>Stacks children vertically top to bottom.</p>\n<pre><code>ui.column()\n    .padding(8)\n    .gap(6)\n    .add(ui.label(...))\n    .add(ui.button(...))</code></pre>\n\n<h2>row</h2>\n<p>Places children horizontally left to right.</p>\n<pre><code>ui.row()\n    .gap(8)\n    .fillWidth()\n    .add(ui.energyBar())\n    .add(ui.progressBar().grow())</code></pre>\n\n<h2>grid</h2>\n<p>Arranges children in a fixed number of columns.</p>\n<pre><code>ui.grid(3, 3)   // 3 columns, 3 rows</code></pre>\n\n<h2>tabs</h2>\n<p>Shows one child panel at a time with a tab bar.</p>\n<pre><code>ui.tabs()\n    .tab(\"Main\",  mainPanel)\n    .tab(\"Inv\",   invPanel)\n    .tab(\"Tune\",  tunePanel)</code></pre>\n<p>Only the active tab participates in layout and input. Inactive tabs are skipped entirely.</p>\n\n<h2>scrollPanel</h2>\n<p>Makes its content scrollable when it overflows the panel bounds.</p>\n<pre><code>ui.scrollPanel()\n    .size(200, 120)\n    .add(ui.column().gap(4)\n        // many children\n    )</code></pre>\n\n<h2>Size modifiers</h2>\n<table>\n<thead><tr><th>Method</th><th>Effect</th></tr></thead>\n<tbody>\n<tr><td><code>.size(w, h)</code></td><td>Fixed width and height</td></tr>\n<tr><td><code>.width(w)</code></td><td>Fixed width only</td></tr>\n<tr><td><code>.height(h)</code></td><td>Fixed height only</td></tr>\n<tr><td><code>.fillWidth()</code></td><td>Expand to parent width</td></tr>\n<tr><td><code>.fillHeight()</code></td><td>Expand to parent height</td></tr>\n<tr><td><code>.grow()</code></td><td>Fill remaining space in parent axis</td></tr>\n<tr><td><code>.padding(n)</code></td><td>Inner padding on all sides</td></tr>\n<tr><td><code>.gap(n)</code></td><td>Space between children</td></tr>\n</tbody>\n</table>\n\n",
        "viewmodel": "<h1>ViewModel & Binding</h1>\n<p class=\"page-subtitle\">Syncing server state to the UI.</p>\n\n<p>A ViewModel is the bridge between server state and the UI. It holds typed values that are automatically synced to the client when they change.</p>\n\n<h2>Defining a ViewModel</h2>\n<pre><code>public class MachineViewModel extends UIViewModel {\n\n    public final SyncedInt   energy    = syncInt(\"energy\", 0);\n    public final SyncedInt   maxEnergy = syncInt(\"maxEnergy\", 10000);\n    public final SyncedFloat progress  = syncFloat(\"progress\", 0f);\n    public final SyncedBool  working   = syncBool(\"working\", false);\n    public final SyncedStr   status    = syncStr(\"status\", \"Idle\");\n}</code></pre>\n\n<h2>Synced types</h2>\n<table>\n<thead><tr><th>Type</th><th>Method</th></tr></thead>\n<tbody>\n<tr><td><code>SyncedInt</code></td><td><code>syncInt(key, defaultValue)</code></td></tr>\n<tr><td><code>SyncedFloat</code></td><td><code>syncFloat(key, defaultValue)</code></td></tr>\n<tr><td><code>SyncedBool</code></td><td><code>syncBool(key, defaultValue)</code></td></tr>\n<tr><td><code>SyncedStr</code></td><td><code>syncStr(key, defaultValue)</code></td></tr>\n</tbody>\n</table>\n\n<h2>Updating values</h2>\n<p>Set values on the server. UIWeaver detects changes and sends only the dirty values:</p>\n<pre><code>viewModel.energy.set(container.getEnergyStored());\nviewModel.progress.set(currentProgress / maxProgress);\nviewModel.working.set(isRunning());</code></pre>\n\n<h2>Binding to components</h2>\n<p>Use <code>.bind(key)</code> to connect a component to a ViewModel value:</p>\n<pre><code>ui.progressBar().bind(\"progress\")\n\nui.energyBar().bind(\"energy\", \"maxEnergy\")\n\nui.label(Component.literal(\"\")).bind(\"status\")  // updates text\n\nui.toggle().bind(\"working\")</code></pre>\n\n<div class=\"note\"><strong>Note:</strong> Binding is one-way \u2014 server to client. User input goes back through server actions, not through ViewModel writes.</div>\n\n",
        "server-actions": "<h1>Server Actions</h1>\n<p class=\"page-subtitle\">How user input reaches the server safely.</p>\n\n<p>Interactive widgets like buttons and toggles send named actions to the server instead of directly changing state. This keeps the client from being trusted with anything it shouldn't control.</p>\n\n<h2>Declaring an action</h2>\n<pre><code>ui.button(Component.literal(\"Start\"))\n    .id(\"btnStart\")\n    .action(\"start\")</code></pre>\n\n<p>When clicked, UIWeaver sends an action packet with the name <code>\"start\"</code> to the server.</p>\n\n<h2>Handling actions</h2>\n<p>Override <code>onAction</code> in your screen handler or machine class:</p>\n<pre><code>@Override\npublic void onAction(ServerPlayer player, String action) {\n    switch (action) {\n        case \"start\"  -> { if (canStart()) startMachine(); }\n        case \"stop\"   -> stopMachine();\n        case \"reset\"  -> resetMachine();\n    }\n}</code></pre>\n\n<h2>Actions with data</h2>\n<p>Some widgets send additional data with their action:</p>\n<pre><code>ui.slider(0, 100)\n    .id(\"speedSlider\")\n    .action(\"setSpeed\")   // sends value as int</code></pre>\n\n<pre><code>@Override\npublic void onAction(ServerPlayer player, String action, int value) {\n    if (action.equals(\"setSpeed\")) setSpeed(value);\n}</code></pre>\n\n<h2>Validation</h2>\n<p>Always validate on the server. The client can send any action at any time:</p>\n<pre><code>case \"start\" -> {\n    if (!player.hasPermissions(2)) return;\n    if (!isFormed()) return;\n    if (isRunning()) return;\n    startMachine();\n}</code></pre>\n\n",
        "debug": "<h1>Debug & Inspector</h1>\n<p class=\"page-subtitle\">Built-in tools for diagnosing layout and sync issues.</p>\n\n<p>UIWeaver includes a debug overlay and inspector to help diagnose layout and sync issues without adding print statements.</p>\n\n<h2>Enabling the debug overlay</h2>\n<p>Press <code>F8</code> while a UIWeaver screen is open (configurable in keybinds). The overlay draws colored borders around every component showing its computed bounds.</p>\n\n<h2>What the overlay shows</h2>\n<table>\n<thead><tr><th>Color</th><th>Meaning</th></tr></thead>\n<tbody>\n<tr><td>Blue</td><td>Container bounds</td></tr>\n<tr><td>Green</td><td>Leaf component bounds</td></tr>\n<tr><td>Red</td><td>Component overflowing its parent</td></tr>\n<tr><td>Yellow</td><td>Component with no computed size</td></tr>\n</tbody>\n</table>\n\n<h2>Inspector</h2>\n<p>Press <code>F9</code> to open the inspector panel. It shows the full component tree with:</p>\n<ul style=\"margin: 12px 0 16px 20px; line-height: 2;\">\n    <li>Component type and ID</li>\n    <li>Computed bounds (x, y, width, height)</li>\n    <li>Visibility state</li>\n    <li>Bound ViewModel keys and their current values</li>\n</ul>\n\n<h2>Common issues and what to look for</h2>\n<table>\n<thead><tr><th>Symptom</th><th>Check</th></tr></thead>\n<tbody>\n<tr><td>Component invisible</td><td>Red or yellow border \u2014 bounds are zero or outside parent</td></tr>\n<tr><td>Slot misaligned with visual</td><td>Slot grid bounds vs actual slot positions</td></tr>\n<tr><td>Inactive tab receiving input</td><td>Inspector \u2014 visibility should be false for inactive tabs</td></tr>\n<tr><td>ViewModel value not updating</td><td>Inspector \u2014 check bound key current value</td></tr>\n<tr><td>Layout looks wrong after resize</td><td>Overlay \u2014 check if parent clipped the child</td></tr>\n</tbody>\n</table>\n\n<div class=\"note\"><strong>Note:</strong> The debug overlay is client-only and has no effect in production. It can be left in the code safely.</div>\n\n",
        "components-layout": "<h1>Layout Components</h1>\n<p class=\"page-subtitle\">column, row, grid, tabs, scrollPanel.</p>\n\n<p>Layout components hold and position other components. They do not render any visible content themselves.</p>\n\n<h2>column</h2>\n<pre><code>ui.column()\n    .padding(8).gap(6)\n    .add(child1).add(child2)</code></pre>\n<p>Stacks children top to bottom. Default width is the widest child. Default height is the sum of children plus gaps.</p>\n\n<h2>row</h2>\n<pre><code>ui.row()\n    .gap(8).fillWidth()\n    .add(child1).add(child2)</code></pre>\n<p>Places children left to right. Default height is the tallest child.</p>\n\n<h2>grid</h2>\n<pre><code>ui.grid(cols, rows)\n    .gap(4)\n    .add(child1) ... .add(childN)</code></pre>\n<p>Fills cells left to right, top to bottom. All cells are equal size.</p>\n\n<h2>tabs</h2>\n<pre><code>ui.tabs()\n    .tab(\"Label\", panel)\n    .tab(\"Label2\", panel2)</code></pre>\n<p>Renders a tab bar above the active panel. Only the active panel participates in layout and input.</p>\n\n<h2>scrollPanel</h2>\n<pre><code>ui.scrollPanel()\n    .size(200, 140)\n    .add(ui.column().gap(4).add(...))</code></pre>\n<p>Clips its content to the panel bounds and allows scrolling. Supports mouse wheel.</p>\n\n",
        "components-display": "<h1>Display Components</h1>\n<p class=\"page-subtitle\">label, progressBar, energyBar, fluidBar.</p>\n\n<p>Display components render information. They do not accept user input.</p>\n\n<h2>label</h2>\n<pre><code>ui.label(Component.literal(\"Hello\"))\nui.label(Component.literal(\"\")).bind(\"status\")  // dynamic</code></pre>\n\n<h2>progressBar</h2>\n<pre><code>ui.progressBar()\n    .bind(\"progress\")   // float 0.0\u20131.0\n    .fillWidth().height(10)</code></pre>\n\n<h2>energyBar</h2>\n<pre><code>ui.energyBar()\n    .bind(\"energy\", \"maxEnergy\")\n    .size(12, 54)</code></pre>\n<p>Renders vertically by default. Tooltip shows current / max values.</p>\n\n<h2>fluidBar</h2>\n<pre><code>ui.fluidBar()\n    .bind(\"fluid\", \"fluidMax\")\n    .size(12, 54)</code></pre>\n<p>Same as energyBar but renders the fluid texture and color.</p>\n\n",
        "components-input": "<h1>Input Components</h1>\n<p class=\"page-subtitle\">button, toggle, checkbox, slider, textInput.</p>\n\n<p>Input components send server actions or toggle local display state.</p>\n\n<h2>button</h2>\n<pre><code>ui.button(Component.literal(\"Start\"))\n    .id(\"btnStart\")\n    .action(\"start\")\n    .size(60, 20)</code></pre>\n\n<h2>toggle</h2>\n<pre><code>ui.toggle()\n    .id(\"activeToggle\")\n    .action(\"setActive\")\n    .bind(\"active\")</code></pre>\n<p>Displays as an on/off switch. Sends action with current boolean value.</p>\n\n<h2>checkbox</h2>\n<pre><code>ui.checkbox(Component.literal(\"Enable filter\"))\n    .action(\"setFilter\")</code></pre>\n\n<h2>slider</h2>\n<pre><code>ui.slider(0, 100)\n    .id(\"speed\")\n    .value(50)\n    .action(\"setSpeed\")\n    .width(120)</code></pre>\n<p>Sends the integer value with the action when released.</p>\n\n<h2>textInput</h2>\n<pre><code>ui.textInput()\n    .id(\"nameField\")\n    .placeholder(\"Enter name...\")\n    .action(\"setName\")\n    .width(140)</code></pre>\n<p>Sends the string value with the action on Enter or focus loss.</p>\n\n",
        "components-inventory": "<h1>Inventory Components</h1>\n<p class=\"page-subtitle\">slotGrid and player inventory.</p>\n\n<p>Inventory components bridge UIWeaver's layout system with Minecraft's slot system.</p>\n\n<h2>slotGrid</h2>\n<pre><code>ui.slotGrid(3, 3)\n    .id(\"inputSlots\")\n    .bind(\"machineInv\")</code></pre>\n<p>Renders a grid of item slots. Slot positions are computed from the layout pass and then registered as real Minecraft <code>Slot</code> objects at those positions.</p>\n\n<div class=\"note\"><strong>Known limitation:</strong> Slot visual positions and actual <code>Slot</code> positions must stay perfectly synchronized. This is the most active area of improvement in UIWeaver. See <a href=\"limitations.html\">Known Limitations</a> for details.</div>\n\n<h2>Binding to an inventory</h2>\n<p>The bound key should resolve to an <code>IItemHandler</code> or <code>Container</code> registered in the ViewModel:</p>\n<pre><code>public final SyncedInv machineInv = syncInv(\"machineInv\", handler);</code></pre>\n\n<h2>Player inventory</h2>\n<p>To include the player inventory at the bottom of the screen:</p>\n<pre><code>ui.column()\n    .add(machineArea)\n    .add(ui.playerInventory())</code></pre>\n<p><code>playerInventory()</code> automatically adds all 36 player slots at the correct positions.</p>\n\n",
        "api": "<h1>Component API</h1>\n<p class=\"page-subtitle\">Method reference for all components.</p>\n\n<p>Quick reference for all common methods available on UIWeaver components.</p>\n\n<h2>Universal</h2>\n<table>\n<thead><tr><th>Method</th><th>Description</th></tr></thead>\n<tbody>\n<tr><td><code>.id(String)</code></td><td>Assign an ID for binding, inspection, and targeting</td></tr>\n<tr><td><code>.size(w, h)</code></td><td>Fixed pixel size</td></tr>\n<tr><td><code>.width(w)</code></td><td>Fixed width</td></tr>\n<tr><td><code>.height(h)</code></td><td>Fixed height</td></tr>\n<tr><td><code>.fillWidth()</code></td><td>Expand to parent's available width</td></tr>\n<tr><td><code>.fillHeight()</code></td><td>Expand to parent's available height</td></tr>\n<tr><td><code>.grow()</code></td><td>Take remaining space along parent axis</td></tr>\n<tr><td><code>.visible(bool)</code></td><td>Show or hide (hidden components still occupy space)</td></tr>\n<tr><td><code>.tooltip(Component)</code></td><td>Tooltip shown on hover</td></tr>\n</tbody>\n</table>\n\n<h2>Containers only</h2>\n<table>\n<thead><tr><th>Method</th><th>Description</th></tr></thead>\n<tbody>\n<tr><td><code>.padding(n)</code></td><td>Inner padding all sides</td></tr>\n<tr><td><code>.padding(x, y)</code></td><td>Horizontal and vertical padding</td></tr>\n<tr><td><code>.gap(n)</code></td><td>Space between children</td></tr>\n<tr><td><code>.add(component)</code></td><td>Add a child component</td></tr>\n</tbody>\n</table>\n\n<h2>Bindable components</h2>\n<table>\n<thead><tr><th>Method</th><th>Description</th></tr></thead>\n<tbody>\n<tr><td><code>.bind(key)</code></td><td>Bind to a single ViewModel value</td></tr>\n<tr><td><code>.bind(key1, key2)</code></td><td>Bind to two values (e.g. current + max)</td></tr>\n</tbody>\n</table>\n\n<h2>Interactive components</h2>\n<table>\n<thead><tr><th>Method</th><th>Description</th></tr></thead>\n<tbody>\n<tr><td><code>.action(String)</code></td><td>Named action sent to server on interaction</td></tr>\n<tr><td><code>.value(n)</code></td><td>Initial value (slider)</td></tr>\n<tr><td><code>.placeholder(String)</code></td><td>Placeholder text (textInput)</td></tr>\n</tbody>\n</table>\n\n<h2>UIWeaver.screen()</h2>\n<table>\n<thead><tr><th>Method</th><th>Description</th></tr></thead>\n<tbody>\n<tr><td><code>.root(component)</code></td><td>Set the root component</td></tr>\n<tr><td><code>.viewModel(vm)</code></td><td>Attach a ViewModel</td></tr>\n<tr><td><code>.open()</code></td><td>Send to player and open the screen</td></tr>\n</tbody>\n</table>\n\n",
        "limitations": "<h1>Known Limitations</h1>\n<p class=\"page-subtitle\">What is still being worked on.</p>\n\n<p>UIWeaver is experimental. These are the known areas that need more work before UIWeaver is ready for complex production UIs.</p>\n\n<h2>Slot layout synchronization</h2>\n<p>Minecraft requires <code>Slot</code> objects to be registered at exact pixel positions matching what the screen renders. UIWeaver computes slot positions from the layout pass, but any inconsistency between the layout result and the registered slot positions causes misaligned click targets and item rendering issues.</p>\n<p>This is the highest priority area for improvement.</p>\n\n<h2>Tabs</h2>\n<p>Inactive tabs should not participate in layout, receive input, or be considered by the inspector unless explicitly debugging. The current implementation handles this in most cases but can produce stale child bounds after switching tabs quickly.</p>\n\n<h2>Styling</h2>\n<p>There is no styling API yet. Component appearance is determined by the default renderer. Planned:</p>\n<ul style=\"margin: 12px 0 16px 20px; line-height: 2;\">\n    <li>Panel backgrounds and borders</li>\n    <li>Hover and active states</li>\n    <li>Spacing tokens</li>\n    <li>Theme variants</li>\n    <li>Reusable style presets</li>\n</ul>\n\n<h2>Scroll and large inventories</h2>\n<p>The current <code>scrollPanel</code> works for general content but does not support virtual scrolling over very large item handlers (thousands of slots). Implementing that requires a custom slot remapping layer outside the standard UIWeaver component model.</p>\n\n<h2>API stability</h2>\n<p>UIWeaver is at v0.1.0. Method names and package structure may change in future versions. Check the GitHub changelog before upgrading.</p>\n\n"
    };

        "index": ["","","installation","Installation"],

    function navigate(id) {
        var content = PAGES[id];
        if (!content) return;
        var pag = PAGINATION[id];
        var prev = pag[0] ? '<a href="#' + pag[0] + '" onclick="navigate(\'' + pag[0] + '\'")><span class="label">← Previous</span><span class="title">' + pag[1] + '</span></a>' : '<span></span>';
        var next = pag[2] ? '<a href="#' + pag[2] + '" onclick="navigate(\'' + pag[2] + '\')" style="text-align:right"><span class="label">Next →</span><span class="title">' + pag[3] + '</span></a>' : '<span></span>';
        document.getElementById('content').innerHTML = content + '<div class="pagination">' + prev + next + '</div>';
        document.querySelectorAll('#sidebar a').forEach(function(a) {
            a.classList.toggle('active', a.getAttribute('href') === '#' + id);
        });
        document.title = (document.querySelector('#sidebar a.active') || {}).textContent + ' — UIWeaver';
        window.scrollTo(0, 0);
    }

    function toggleTheme() {
        var dark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', dark ? '' : 'dark');
        localStorage.setItem('theme', dark ? 'light' : 'dark');
        document.getElementById('theme-btn').textContent = dark ? 'dark' : 'light';
    }

    if (localStorage.getItem('theme') === 'dark')
        document.getElementById('theme-btn').textContent = 'light';

    var initial = location.hash.replace('#', '') || 'index';
    navigate(initial);

    window.addEventListener('popstate', function() {
        var id = location.hash.replace('#', '') || 'index';
        navigate(id);
    });
</script>
