name: Release

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: ./gradlew build

      - name: Publish to CurseForge and Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 1547409
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          modrinth-id: upvJ1pjQ
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          files: |
            forge/build/libs/!(*-@(dev|sources|javadoc)).jar
            fabric/build/libs/!(*-@(dev|sources|javadoc)).jar

          name: UIWeaver ${{ github.event.release.tag_name }}
          version: ${{ github.event.release.tag_name }}
          version-type: release
          changelog: ${{ github.event.release.body }}

          game-versions: 1.20.1
          loaders: |
            forge
            fabric
          java: 17